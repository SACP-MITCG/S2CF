services:
  bac:
    build: .
    container_name: bac-app
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - DEBUG=false
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/usecases')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads:
    driver: local
